# OpenResty vhost for log-lottery
# Place this file in OpenResty/Nginx conf.d, then reload OpenResty.

server {
    listen 80;
    server_name zjcj.2866185.cn;

    client_max_body_size 20m;

    # Optional: keep root behavior aligned with app routing
    location = / {
        return 301 /log-lottery/;
    }

    # Forward all app traffic to web container (host port 9279).
    # /log-lottery/, /api/, /admin/, /static/ are handled there.
    location / {
        proxy_pass http://127.0.0.1:9279;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
